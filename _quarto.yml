project:
  type: book
  output-dir: docs

book:
  title: "Alerta 1. Caracterización de estudiantes"
  site-url: https://udesanalitica.github.io/alerta1_cx_2026-1/
  repo-url: https://github.com/udesanalitica/alerta1_cx_2026-1
  repo-actions: [edit, issue, source]
  reader-mode: true
  cover-image: images/cover.png
  cover-image-alt: "Portada del libro Alerta 1"

  sidebar:
    style: docked
    search: true
    tools:
      - icon: github
        href: https://github.com/udesanalitica/alerta1_cx_2026-1
        text: "Repositorio GitHub"
      - icon: file-earmark-pdf
        href: "Alerta1_2026-1.pdf"
        text: "Descargar PDF"

  page-footer:
    left: |
      **Alerta 1. Caracterización de estudiantes** fue creado por la
      Dirección de Planeación Institucional, Universidad de Santander.
    right: |
      Este libro fue construido con <a href="https://quarto.org/" target="_blank">Quarto</a>.
    center: |
      <a href="https://github.com/udesanalitica/alerta1_cx_2026-1" target="_blank" aria-label="GitHub"><i class="bi bi-github"></i></a>
      <a href="#" aria-label="Compartir" style="margin-left: 10px;"><i class="bi bi-share"></i></a>
      <a href="javascript:window.print()" aria-label="Imprimir" style="margin-left: 10px;"><i class="bi bi-printer"></i></a>

  chapters:
    - index.qmd
    - intro.qmd
    - Seccion0.qmd
    - Seccion1.qmd
    - Seccion2.qmd
    - Seccion3.qmd
    - Seccion4.qmd
    - Conclusiones.qmd

bibliography: references.bib
csl: apa.csl

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    fontsize: 1em
    css: style.css
    fig-cap-location: top
    reference-location: document
    cite-method: citeproc
    include-in-header: header.html
    page-layout: article

crossref:
  chapters: true
  title-delim: "."
  fig-prefix: "Figura"
  tbl-prefix: "Tabla"

editor: visual